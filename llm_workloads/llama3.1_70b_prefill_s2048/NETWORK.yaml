network:
  model_name: llama3.1_70b
  phase: prefill (seq_len=2048)
  batch_size: 1
  attention: 'Q@K^T: (2048 x 2048)'
architecture:
  hidden_size: 8192
  num_attention_heads: 64
  num_key_value_heads: 8
  head_dim: 128
  intermediate_size: 28672
  vocab_size: 128256
  num_hidden_layers: 80
structure:
  description: All 80 decoder layers have identical operator dimensions. Only layer
    0 YAMLs are stored. To get the full network, repeat layer 0 operators 80 times,
    then append lm_head.
  total_operators: 721
  operators_per_layer: 9
  num_layers: 80
  layer_operators:
  - layer0_q_proj
  - layer0_k_proj
  - layer0_v_proj
  - layer0_attn_qk
  - layer0_attn_v
  - layer0_o_proj
  - layer0_gate_proj
  - layer0_up_proj
  - layer0_down_proj
  global_operators:
  - lm_head
